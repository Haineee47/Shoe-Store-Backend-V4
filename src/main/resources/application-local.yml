spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shoe_store}
    username: ${DB_USERNAME:shoe_store}
    password: ${DB_PASSWORD:ShoeStore@2026}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: ShoeStorePool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
