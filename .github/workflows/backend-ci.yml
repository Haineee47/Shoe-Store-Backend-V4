name: Backend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify Backend
    runs-on: ubuntu-latest

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/shoe_store_ci
      SPRING_DATASOURCE_USERNAME: shoe_store_ci
      SPRING_DATASOURCE_PASSWORD: shoe_store_ci_password
      SPRING_FLYWAY_ENABLED: "true"

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: shoe_store_ci
          POSTGRES_USER: shoe_store_ci
          POSTGRES_PASSWORD: shoe_store_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U shoe_store_ci -d shoe_store_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Eclipse Temurin Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Display Java version
        run: java -version

      - name: Display Maven version
        run: mvn --version

      - name: Build and verify backend
        run: mvn --batch-mode clean verify
