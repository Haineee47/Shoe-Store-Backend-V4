services:
  postgres:
    image: postgres:17
    container_name: shoe-store-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      PGTZ: ${PGTZ:-UTC}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - shoe_store_postgres_data:/var/lib/postgresql/data

    networks:
      - shoe_store_network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  shoe_store_postgres_data:
    name: shoe-store-postgres-data

networks:
  shoe_store_network:
    name: shoe-store-network
    driver: bridge
